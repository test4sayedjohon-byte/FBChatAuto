name = "autometabot-webhook"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "metachat.junoverseai.com", custom_domain = true }
]

# ──────────────────────────────────────────────
# Environment Variables (set via `wrangler secret put`)
# ──────────────────────────────────────────────
# FB_VERIFY_TOKEN        - Your custom webhook verification token
# FB_APP_SECRET          - Facebook App Secret (for signature verification)
# SUPABASE_URL           - Supabase project URL
# SUPABASE_SERVICE_KEY   - Supabase service_role key (bypasses RLS)
# OPENAI_API_KEY         - OpenAI API key (Phase 2)

[vars]
ENVIRONMENT = "production"

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "fbchatauto_failover"
database_id = "a26bad10-48cc-447a-8795-2e5e1896eb4e"

# ──────────────────────────────────────────────
# Queues (Phase 3: Rate-Limit Backoff & Circuit Breaker)
# ──────────────────────────────────────────────
[[queues.producers]]
binding = "SOCIAL_POSTER_QUEUE"
queue = "social-poster-queue"

[[queues.consumers]]
queue = "social-poster-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
